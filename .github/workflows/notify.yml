name: 課題締切 LINE通知（全ユーザー）

on:
  # ─────────────────────────────────
  # 毎朝 7:00 JST  → UTC 前日 22:00（日数ベース通知: 3日前・1日前）
  # 毎日 12:00 JST → UTC 03:00    （時間ベース通知: 12時間前）
  # ─────────────────────────────────
  schedule:
    - cron: '0 22 * * *'   # 7:00 JST
    - cron: '0 3 * * *'    # 12:00 JST

  # GitHub の Actions タブから手動実行も可能
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.12 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 依存ライブラリのインストール
        run: pip install -r requirements.txt

      - name: 全ユーザーへ課題締切通知スクリプトを実行
        env:
          DATABASE_URL:                ${{ secrets.DATABASE_URL }}
          ENCRYPTION_KEY:              ${{ secrets.ENCRYPTION_KEY }}
          MOODLE_URL:                  ${{ secrets.MOODLE_URL }}
          LINE_CHANNEL_ACCESS_TOKEN:   ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        run: python notify_all.py
