name: 課題締切 LINE通知

on:
  # ─────────────────────────────────
  # 毎朝 7:00 JST に自動実行
  # JST = UTC+9 なので UTC では 22:00（前日）
  # ─────────────────────────────────
  schedule:
    - cron: '0 22 * * *'

  # GitHub の Actions タブから手動実行も可能
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.12 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 依存ライブラリのインストール
        run: pip install -r requirements.txt

      - name: 課題締切通知スクリプトを実行
        env:
          MOODLE_URL:                  ${{ secrets.MOODLE_URL }}
          MOODLE_USERNAME:             ${{ secrets.MOODLE_USERNAME }}
          MOODLE_PASSWORD:             ${{ secrets.MOODLE_PASSWORD }}
          LINE_CHANNEL_ACCESS_TOKEN:   ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID:                ${{ secrets.LINE_USER_ID }}
          NOTIFY_DAYS_BEFORE:          ${{ secrets.NOTIFY_DAYS_BEFORE }}
        run: python main.py
